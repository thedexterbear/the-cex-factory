name: Deploy to GitHub Pages with LFS

on:
  push:
    branches:
      - main  # Runs every time you push to the main branch

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true # This is the magic line that pulls the real .wasm file

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads everything in the current folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
